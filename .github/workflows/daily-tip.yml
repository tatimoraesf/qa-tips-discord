name: Shift-Left Daily Tip

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  send-tip:
    name: Enviar dica do dia no Discord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Download histórico de dicas
        uses: actions/download-artifact@v4
        with:
          name: sent-tips
          path: data/
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Criar pasta data
        run: mkdir -p data

      - name: Instalar dependências
        run: npm ci

      - name: Enviar dica para o Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm start

      - name: Salvar histórico das dicas
        uses: actions/upload-artifact@v4
        with:
          name: sent-tips
          path: data/sent-tips.json