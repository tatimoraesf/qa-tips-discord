name: Shift-Left Daily Tip

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  send-tip:
    name: Enviar dica do dia no Discord
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Criar pasta data
        run: mkdir -p data

      - name: Instalar dependências
        run: npm ci

      - name: Enviar dica para o Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm start

      - name: Salvar histórico no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent-tips.json
          git diff --staged --quiet || git commit -m "chore: atualizar histórico de dicas [skip ci]"
          git push